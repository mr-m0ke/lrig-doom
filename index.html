<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>☠ UAC LAB AUTOMATION FACILITY ☠</title>
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: monospace; touch-action: none;
  }

  /* ── Loading screen ── */
  #loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #e00;
    letter-spacing: 2px; gap: 10px;
  }
  #load-title  { font-size: clamp(12px,3vw,18px); text-shadow: 0 0 12px #f00; }
  #load-sub    { color: #555; font-size: 11px; }
  #load-status { font-size: 12px; color: #777; }
  #progress-bar {
    width: 220px; height: 4px;
    background: #1a1a1a; border: 1px solid #e00; margin-top: 6px;
  }
  #progress-fill { height: 100%; background: #e00; width: 0%; transition: width 0.3s; }

  /* ══════════════════════════════════════════════
     MOBILE LAYOUT  (default — touch devices)
  ══════════════════════════════════════════════ */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }

  /* Canvas: fixed 4:3 Doom ratio at top */
  #canvas-wrap {
    width: 100%;
    aspect-ratio: 4 / 3;
    flex-shrink: 0;
    background: #000;
  }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }

  /* Controls: fills remaining height */
  #controls-panel {
    flex: 1 1 0;
    min-height: 0;
    background: #0c0c0c;
    border-top: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 8px 16px;
    gap: 6px;
  }

  /* Top util row */
  #util-row {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .util-btn {
    flex: 1;
    max-width: 80px;
    padding: 7px 4px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 7px;
    color: rgba(255,255,255,0.65);
    font-family: monospace;
    font-size: 11px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
  }
  .util-btn:active, .util-btn.pressed { background: rgba(255,255,255,0.22); color:#fff; }

  /* Main row: dpad + actions */
  #main-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 0 8px;
  }

  /* D-pad */
  #dpad {
    position: relative;
    width: 136px;
    height: 136px;
    flex-shrink: 0;
  }
  .dp {
    position: absolute;
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.11);
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: rgba(255,255,255,0.8);
    cursor: pointer;
  }
  .dp:active, .dp.pressed { background: rgba(255,255,255,0.3); }
  #btn-up    { top:0;    left:47px; }
  #btn-down  { bottom:0; left:47px; }
  #btn-left  { top:47px; left:0;   }
  #btn-right { top:47px; right:0;  }
  .dp-center {
    position:absolute; top:47px; left:47px;
    width:42px; height:42px;
    border-radius:50%;
    background: rgba(255,255,255,0.03);
    pointer-events:none;
  }

  /* Action buttons */
  #action-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr;
    gap: 10px;
    flex: 1;
  }
  .ab {
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: monospace; font-weight: bold;
    font-size: 10px; letter-spacing: 0.5px;
    gap: 2px; cursor: pointer; border: 2px solid;
  }
  .ab .ic { font-size: 20px; line-height: 1; }
  .ab:active, .ab.pressed { filter: brightness(1.6); }

  #btn-fire   { background:rgba(200,0,0,0.3);   border-color:rgba(220,0,0,0.65);   color:#ff4444; }
  #btn-select { background:rgba(0,200,70,0.2);   border-color:rgba(0,210,70,0.55);  color:#00dd55; }
  #btn-run    { background:rgba(255,150,0,0.18); border-color:rgba(255,150,0,0.45); color:#ffaa00; }
  #btn-use    { background:rgba(0,140,255,0.18); border-color:rgba(0,140,255,0.45); color:#44aaff; }

  /* ══════════════════════════════════════════════
     DESKTOP LAYOUT  (pointer: fine)
  ══════════════════════════════════════════════ */
  @media (pointer: fine) {
    #canvas-wrap { aspect-ratio: unset; flex: 1 1 auto; }
    #controls-panel { display: none; }
    #kb-legend { display: flex; }
  }

  /* Keyboard legend */
  #kb-legend {
    display: flex;
    background: #080808;
    border-top: 1px solid #1a1a1a;
    padding: 9px 20px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    column-gap: 20px;
    row-gap: 5px;
  }
  .kb-item {
    display: flex; align-items: center; gap: 5px;
    color: #888; font-family: monospace; font-size: 11px;
  }
  kbd {
    display: inline-block; padding: 2px 6px;
    background: #1a1a1a; border: 1px solid #333;
    border-bottom: 2px solid #444; border-radius: 4px;
    color: #ccc; font-family: monospace; font-size: 10px;
    line-height: 1.4; white-space: nowrap;
  }
  .kb-div { width:1px; height:12px; background:#222; }
</style>
</head>
<body>

<div id="loading">
  <div id="load-title">☠ UAC LAB AUTOMATION FACILITY ☠</div>
  <div id="load-sub">rip and tear… through the vendor hall</div>
  <div>LOADING…</div>
  <div id="load-status">Initializing…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="app">
  <div id="canvas-wrap">
    <canvas id="dosbox"></canvas>
  </div>

  <!-- Mobile controls -->
  <div id="controls-panel">
    <div id="util-row">
      <div class="util-btn" id="btn-esc">ESC</div>
      <div class="util-btn" id="btn-map">MAP</div>
    </div>
    <div id="main-row">
      <div id="dpad">
        <div class="dp" id="btn-up">▲</div>
        <div class="dp" id="btn-left">◀</div>
        <div class="dp-center"></div>
        <div class="dp" id="btn-right">▶</div>
        <div class="dp" id="btn-down">▼</div>
      </div>
      <div id="action-btns">
        <div class="ab" id="btn-fire">  <span class="ic">🔥</span>FIRE</div>
        <div class="ab" id="btn-use">   <span class="ic">🚪</span>USE</div>
        <div class="ab" id="btn-select"><span class="ic">✓</span>OK</div>
      </div>
    </div>
  </div>

  <!-- Desktop keyboard legend -->
  <div id="kb-legend">
    <div class="kb-item"><kbd>↑ ↓</kbd> Move</div>
    <div class="kb-item"><kbd>← →</kbd> Turn</div>
    <div class="kb-div"></div>
    <div class="kb-item"><kbd>Ctrl</kbd> Fire</div>
    <div class="kb-item"><kbd>Space</kbd> Use</div>
    <div class="kb-item"><kbd>Shift</kbd> Run</div>
    <div class="kb-item"><kbd>Alt</kbd> Strafe</div>
    <div class="kb-div"></div>
    <div class="kb-item"><kbd>Enter</kbd> Select</div>
    <div class="kb-item"><kbd>Tab</kbd> Map</div>
    <div class="kb-item"><kbd>1–7</kbd> Weapons</div>
    <div class="kb-item"><kbd>Esc</kbd> Menu</div>
  </div>
</div>

<script src="assets/js/jsdos.js"></script>
<script>
  // Block scroll/zoom
  document.addEventListener('touchmove',     function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('touchstart',    function(e){ if(e.touches.length>1) e.preventDefault(); }, { passive:false });
  document.addEventListener('gesturestart',  function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive:false });

  var KEY = { UP:38, DOWN:40, LEFT:37, RIGHT:39, CTRL:17, SHIFT:16, ALT:18, SPACE:32, TAB:9, ESC:27, ENTER:13 };
  var ci = null;

  function press(k) {
    // Always dispatch a real keyboard event to the canvas — most reliable
    var canvas = document.getElementById('dosbox');
    var target = canvas || document;
    if (canvas) { canvas.focus(); }
    target.dispatchEvent(new KeyboardEvent('keydown', {
      keyCode: k, which: k, key: codeToKey(k),
      bubbles: true, cancelable: true
    }));
    // Also try js-dos CommandInterface API as a secondary path
    if (ci && ci.getKeyEventConsumer) {
      try { ci.getKeyEventConsumer().onPress(k); } catch(e) {}
    }
  }

  function release(k) {
    var canvas = document.getElementById('dosbox');
    var target = canvas || document;
    target.dispatchEvent(new KeyboardEvent('keyup', {
      keyCode: k, which: k, key: codeToKey(k),
      bubbles: true, cancelable: true
    }));
    if (ci && ci.getKeyEventConsumer) {
      try { ci.getKeyEventConsumer().onRelease(k); } catch(e) {}
    }
  }

  // Map keyCode to key string for KeyboardEvent
  function codeToKey(k) {
    var m = {17:'Control',16:'Shift',18:'Alt',32:' ',9:'Tab',27:'Escape',13:'Enter',
             38:'ArrowUp',40:'ArrowDown',37:'ArrowLeft',39:'ArrowRight'};
    return m[k] || String.fromCharCode(k);
  }

  // Boot
  var loadEl = document.getElementById('loading');
  var statEl = document.getElementById('load-status');
  var progEl = document.getElementById('progress-fill');
  statEl.textContent = 'Loading engine…';
  progEl.style.width = '10%';

  Dos(document.getElementById('dosbox'), {
    wdosboxUrl: 'assets/js/wdosbox.js'
  }).ready(function(fs, main) {
    statEl.textContent = 'Extracting DOOM…';
    progEl.style.width = '40%';
    fs.extract('assets/js/doom.zip').then(function() {
      statEl.textContent = 'Starting DOOM…';
      progEl.style.width = '80%';
      main(['-c', 'cd DOOM', '-c', 'DOOM.EXE']).then(function(commandInterface) {
        ci = commandInterface;
        progEl.style.width = '100%';
        setTimeout(function(){
          loadEl.style.display = 'none';
          // Focus canvas so keyboard events reach the emulator
          var canvas = document.getElementById('dosbox');
          if (canvas) { canvas.setAttribute('tabindex','0'); canvas.focus(); }
        }, 500);
      });
    });
  });

  function bindBtn(id, keyCode) {
    var el = document.getElementById(id);
    if (!el) return;
    function dn(e){ e.preventDefault(); e.stopPropagation(); el.classList.add('pressed');    press(keyCode);   }
    function up(e){ e.preventDefault(); e.stopPropagation(); el.classList.remove('pressed'); release(keyCode); }
    el.addEventListener('touchstart',  dn, { passive:false });
    el.addEventListener('touchend',    up, { passive:false });
    el.addEventListener('touchcancel', up, { passive:false });
    el.addEventListener('mousedown',   dn);
    el.addEventListener('mouseup',     up);
    el.addEventListener('mouseleave',  up);
  }

  bindBtn('btn-up',     KEY.UP);
  bindBtn('btn-down',   KEY.DOWN);
  bindBtn('btn-left',   KEY.LEFT);
  bindBtn('btn-right',  KEY.RIGHT);
  bindBtn('btn-fire',   KEY.CTRL);
  bindBtn('btn-run',    KEY.SHIFT);
  bindBtn('btn-use',    KEY.SPACE);
  bindBtn('btn-select', KEY.ENTER);
  bindBtn('btn-strafe', KEY.ALT);
  bindBtn('btn-map',    KEY.TAB);
  bindBtn('btn-esc',    KEY.ESC);
</script>
</body>
</html>
