<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>☠ UAC LAB AUTOMATION FACILITY ☠</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:monospace;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ── Layout: canvas on top, controls panel on bottom ── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }

  #canvas-wrap {
    flex: 0 0 auto;
    width: 100%;
    /* 4:3 aspect ratio for Doom */
    aspect-ratio: 4 / 3;
    background: #000;
    position: relative;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  /* Controls panel fills remaining space */
  #controls-panel {
    flex: 1 1 0;
    min-height: 180px;
    background: #0a0a0a;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    gap: 8px;
  }

  /* ── D-pad ── */
  #dpad {
    width: 148px;
    height: 148px;
    position: relative;
    flex-shrink: 0;
  }

  .dpad-btn {
    position: absolute;
    width: 46px;
    height: 46px;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
  }
  .dpad-btn:active, .dpad-btn.pressed { background: rgba(255,255,255,0.32); }

  #btn-up    { top: 0;    left: 51px; }
  #btn-down  { bottom: 0; left: 51px; }
  #btn-left  { top: 51px; left: 0;   }
  #btn-right { top: 51px; right: 0;  }

  /* Center dead zone */
  .dpad-center {
    position: absolute;
    top: 51px; left: 51px;
    width: 46px; height: 46px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  /* ── Right side: fire + utility ── */
  #right-side {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  /* Top utility row */
  #util-row {
    display: flex;
    gap: 8px;
  }

  .util-btn {
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 7px;
    color: rgba(255,255,255,0.7);
    font-family: monospace;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
    cursor: pointer;
    min-width: 44px;
    text-align: center;
  }
  .util-btn:active, .util-btn.pressed { background: rgba(255,255,255,0.25); color:#fff; }

  /* Main action buttons row */
  #action-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .action-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: monospace;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 2px solid;
    gap: 3px;
  }
  .action-btn span.icon { font-size: 22px; line-height: 1; }

  #btn-fire {
    background: rgba(200,0,0,0.3);
    border-color: rgba(220,0,0,0.6);
    color: #ff4444;
    width: 82px;
    height: 82px;
  }
  #btn-fire:active, #btn-fire.pressed {
    background: rgba(200,0,0,0.65);
  }

  #btn-enter {
    background: rgba(0,220,80,0.2);
    border-color: rgba(0,220,80,0.5);
    color: #00ee55;
    width: 82px;
    height: 82px;
  }
  #btn-enter:active, #btn-enter.pressed {
    background: rgba(0,220,80,0.5);
  }

  #btn-run {
    background: rgba(255,160,0,0.15);
    border-color: rgba(255,160,0,0.4);
    color: #ffaa00;
  }
  #btn-run:active, #btn-run.pressed {
    background: rgba(255,160,0,0.4);
  }

  #btn-use {
    background: rgba(0,160,255,0.15);
    border-color: rgba(0,160,255,0.4);
    color: #44aaff;
  }
  #btn-use:active, #btn-use.pressed {
    background: rgba(0,160,255,0.4);
  }

  /* ── Loading screen ── */
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #e00;
    font-size: 18px; letter-spacing: 2px;
    gap: 10px; z-index: 100;
  }
  #load-title   { font-size: clamp(13px,3vw,20px); text-shadow: 0 0 12px #f00; margin-bottom: 4px; }
  #load-sub     { color: #666; font-size: 11px; margin-bottom: 16px; }
  #load-status  { font-size: 12px; color: #888; }
  #progress-bar { width: 240px; height: 4px; background: #1a1a1a; border: 1px solid #e00; margin-top: 8px; }
  #progress-fill { height: 100%; background: #e00; width: 0%; transition: width 0.3s; }

  /* Desktop: no touch controls, show keyboard legend instead */
  @media (pointer: fine) {
    #controls-panel { display: none; }
    #canvas-wrap { aspect-ratio: unset; flex: 1 1 auto; }
    #kb-legend { display: flex; }
  }

  /* Keyboard legend — desktop only */
  #kb-legend {
    display: none;
    background: #080808;
    border-top: 1px solid #1a1a1a;
    padding: 10px 20px;
    gap: 0;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    column-gap: 24px;
    row-gap: 6px;
  }
  .kb-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #555;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  .kb-item .action {
    color: #888;
  }
  kbd {
    display: inline-block;
    padding: 2px 6px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-bottom: 2px solid #444;
    border-radius: 4px;
    color: #ccc;
    font-family: monospace;
    font-size: 10px;
    line-height: 1.4;
    white-space: nowrap;
  }
  .kb-divider {
    width: 1px;
    height: 14px;
    background: #222;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="loading">
  <div id="load-title">☠ UAC LAB AUTOMATION FACILITY ☠</div>
  <div id="load-sub">rip and tear… through the vendor hall</div>
  <div>LOADING…</div>
  <div id="load-status">Initializing…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="app">
  <div id="canvas-wrap">
    <canvas id="dosbox"></canvas>
  </div>

  <div id="controls-panel">
    <!-- D-pad -->
    <div id="dpad">
      <div class="dpad-btn" id="btn-up">▲</div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" id="btn-right">▶</div>
      <div class="dpad-btn" id="btn-down">▼</div>
    </div>

    <!-- Right side controls -->
    <div id="right-side">
      <div id="util-row">
        <div class="util-btn" id="btn-strafe">STRAFE</div>
        <div class="util-btn" id="btn-map">MAP</div>
        <div class="util-btn" id="btn-esc">ESC</div>
      </div>
      <div id="action-row">
        <div class="action-btn" id="btn-run">
          <span class="icon">⚡</span>RUN
        </div>
        <div class="action-btn" id="btn-use">
          <span class="icon">🚪</span>USE
        </div>
        <div class="action-btn" id="btn-fire">
          <span class="icon">🔥</span>FIRE
        </div>
        <div class="action-btn" id="btn-enter">
          <span class="icon">✓</span>SELECT
        </div>
      </div>
    </div>
  </div>

  <!-- Desktop keyboard legend -->
  <div id="kb-legend">
    <div class="kb-item"><kbd>↑ ↓</kbd> <span class="action">Move</span></div>
    <div class="kb-item"><kbd>← →</kbd> <span class="action">Turn</span></div>
    <div class="kb-divider"></div>
    <div class="kb-item"><kbd>Ctrl</kbd> <span class="action">Fire</span></div>
    <div class="kb-item"><kbd>Space</kbd> <span class="action">Use / Open</span></div>
    <div class="kb-item"><kbd>Shift</kbd> <span class="action">Run</span></div>
    <div class="kb-item"><kbd>Alt</kbd> <span class="action">Strafe</span></div>
    <div class="kb-divider"></div>
    <div class="kb-item"><kbd>Enter</kbd> <span class="action">Select</span></div>
    <div class="kb-item"><kbd>Tab</kbd> <span class="action">Map</span></div>
    <div class="kb-item"><kbd>1–7</kbd> <span class="action">Weapons</span></div>
    <div class="kb-item"><kbd>Esc</kbd> <span class="action">Menu</span></div>
  </div>
</div>

<script src="assets/js/jsdos.js"></script>
<script>
  // ── Prevent scroll/zoom ───────────────────────────────────────────
  document.addEventListener('touchmove',  function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('touchstart', function(e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });

  // ── Key state ─────────────────────────────────────────────────────
  var KEY = {
    UP:38, DOWN:40, LEFT:37, RIGHT:39,
    CTRL:17, SHIFT:16, ALT:18,
    SPACE:32, TAB:9, ESC:27, ENTER:13
  };

  // js-dos v6 stores the key consumer on the CommandInterface (ci)
  var ci = null;

  function pressKey(code) {
    if (ci && ci.getKeyEventConsumer) {
      ci.getKeyEventConsumer().onPress(code);
    }
  }
  function releaseKey(code) {
    if (ci && ci.getKeyEventConsumer) {
      ci.getKeyEventConsumer().onRelease(code);
    }
  }

  // ── Boot js-dos ───────────────────────────────────────────────────
  var loadingEl  = document.getElementById('loading');
  var statusEl   = document.getElementById('load-status');
  var progressEl = document.getElementById('progress-fill');

  statusEl.textContent  = 'Loading engine…';
  progressEl.style.width = '10%';

  Dos(document.getElementById('dosbox'), {
    wdosboxUrl: 'assets/js/wdosbox.js'
  }).ready(function(fs, main) {
    statusEl.textContent  = 'Extracting DOOM…';
    progressEl.style.width = '40%';
    fs.extract('assets/js/doom.zip').then(function() {
      statusEl.textContent  = 'Starting DOOM…';
      progressEl.style.width = '80%';
      main(['-c', 'cd DOOM', '-c', 'DOOM.EXE']).then(function(commandInterface) {
        ci = commandInterface;          // ← store so controls can use it
        progressEl.style.width = '100%';
        setTimeout(function() { loadingEl.style.display = 'none'; }, 500);
      });
    });
  });

  // ── Button binding ────────────────────────────────────────────────
  function bindBtn(id, keyCode) {
    var el = document.getElementById(id);
    if (!el) return;

    function down(e) {
      e.preventDefault();
      e.stopPropagation();
      el.classList.add('pressed');
      pressKey(keyCode);
    }
    function up(e) {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('pressed');
      releaseKey(keyCode);
    }

    el.addEventListener('touchstart',  down, { passive: false });
    el.addEventListener('touchend',    up,   { passive: false });
    el.addEventListener('touchcancel', up,   { passive: false });
    el.addEventListener('mousedown',   down);
    el.addEventListener('mouseup',     up);
    el.addEventListener('mouseleave',  up);
  }

  bindBtn('btn-up',     KEY.UP);
  bindBtn('btn-down',   KEY.DOWN);
  bindBtn('btn-left',   KEY.LEFT);
  bindBtn('btn-right',  KEY.RIGHT);
  bindBtn('btn-fire',   KEY.CTRL);
  bindBtn('btn-run',    KEY.SHIFT);
  bindBtn('btn-use',    KEY.SPACE);
  bindBtn('btn-strafe', KEY.ALT);
  bindBtn('btn-map',    KEY.TAB);
  bindBtn('btn-esc',    KEY.ESC);
  bindBtn('btn-enter',  KEY.ENTER);
</script>
</body>
</html>
